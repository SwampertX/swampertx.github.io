os: linux
language: node_js
node_js:
  - '13'
install:
  - yarn add codecov
script:
  - yarn install
  - yarn run lint
  - yarn run test:coverage --runInBand --no-cache
  - yarn run test --runInBand --no-cache
  - codecov
  - yarn run build
deploy:
  provider: pages
  keep_history: true
  github_token: $GITHUB_TOKEN
  local_dir: public
  target_branch: master
  on:
    branch: gatsby

cache:
  directories:
    - node_modules

